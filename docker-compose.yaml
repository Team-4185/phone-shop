services:

  shop:
    container_name: gadget-room
    build: .
    depends_on:
      - db
      - image-storage
    ports:
      - "${PORT}:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      PORT: 8080
      MINIO_URL: http://image-storage:9000
      MINIO_USERNAME: ${MINIO_USERNAME}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      CORS_ALLOWED_ORIGINS: "['*']"
      CORS_ALLOWED_METHODS: "['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']"
      CORS_ALLOWED_HEADERS: "['*']"
      CORS_MAX_CACHE_AGE: 3600
      CORS_ALLOW_CREDENTIALS: true
      LOG_LEVEL: ${LOG_LEVEL}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      STRIPE_PRIVATE_KEY: ${STRIPE_PRIVATE_KEY}
      STRIPE_PAYMENT_SUCCESS_URL: ${STRIPE_PAYMENT_SUCCESS_URL}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_EXPIRATION_TIME: ${STRIPE_EXPIRATION_TIME}
    networks:
      - gadget-room-network

  db:
    container_name: gadget-room-postgres
    image: postgres:14
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - gadget-room-postgres-volume:/var/lib/postgresql/data
    networks:
      - gadget-room-network

  image-storage:
    container_name: gadget-room-minio
    image: minio/minio
    ports:
      - "${MINIO_STORAGE_PORT}:9000"
      - "${MINIO_STORAGE_WEB_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USERNAME}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - gadget-room-minio-volume:/data
    networks:
      - gadget-room-network

  stripe:
    image: stripe/stripe-cli
    container_name: gadget-room-stripe
    depends_on:
      - shop
    command:
      listen
      --api-key ${STRIPE_PRIVATE_KEY}
      --device-name TEST_DOCKER_CONTAINER
      --events payment_intent.succeeded,checkout.session.expired
      --forward-to http://shop:8080/api/webhook/stripe
      --skip-verify
    networks:
      - gadget-room-network

volumes:
  gadget-room-postgres-volume:
  gadget-room-minio-volume:

networks:
  gadget-room-network:
    driver: bridge